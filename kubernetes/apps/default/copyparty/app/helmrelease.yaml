---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: copyparty
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      copyparty:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: ghcr.io/9001/copyparty-ac
              tag: 1.19.5
            resources:
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        ports:
          http:
            port: 3923

    route:
      app:
        hostnames:
          - copyparty.${SECRET_DOMAIN}
        parentRefs:
          - name: external-gateway-cilium-local
            namespace: network

    persistence:
      media:
        type: hostPath
        hostPath: "/mnt/disk/torrent/GSGA"
        globalMounts:
          - path: /w/GSGA
      secret-file:
        type: secret
        name: copyparty-secret
        globalMounts:
          - path: /cfg/config.conf
            subPath: config.conf
            readOnly: true
